name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    # FIX 1: Explicitly use .NET 8 to avoid the SDK 10 error
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --configuration Release --no-restore
    
    - name: Publish
      run: dotnet publish Frostbite.csproj -c Release -f net8.0 -r win-x64 -o ./publish --self-contained true --force
    
    # FIX 2: Correcting file names based on your Solution Explorer
    - name: Prepare release package
      run: |
        mkdir release_package
        # Copy compiled binaries
        xcopy /E /I publish release_package\
        
        # Copy batch files
        copy *.bat release_package\
        
        # Copy ALL powershell scripts (the wildcard * handles zz_ or _)
        copy *.ps1 release_package\
        
        # Copy remaining assets
        copy *.xml release_package\
        copy LICENSE release_package\
        copy wm.ico release_package\
        copy README.md release_package\
    
    - name: Zip release package
      run: |
        powershell -Command "Compress-Archive -Path release_package\* -DestinationPath Frostbite-${{ github.ref_name }}.zip"
    
    # FIX 3: Added ID 'create_release' so the next step can find the upload URL
    - name: Create GitHub Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: Frostbite ${{ github.ref_name }}
        body_path: notes.md
        draft: false
        prerelease: false
    
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./Frostbite-${{ github.ref_name }}.zip
        asset_name: Frostbite-${{ github.ref_name }}.zip
        asset_content_type: application/zip