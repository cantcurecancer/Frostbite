name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    # FIX 1: Pins SDK to .NET 8 to prevent the NETSDK1005 error
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --configuration Release --no-restore
    
    - name: Publish
      run: dotnet publish Frostbite.csproj -c Release -f net8.0 -r win-x64 -o ./publish --self-contained true --force
    
    # FIX 2: Correcting file names and ensuring PS1 files are included
    - name: Prepare release package
      run: |
        mkdir release_package
        # 1. Copy the compiled app files
        xcopy /E /I publish release_package\
        
        # 2. Copy scripts using wildcards (catches zz_ and batch files)
        copy *.bat release_package\
        copy *.ps1 release_package\
        
        # 3. Copy assets, license, and icon
        copy *.xml release_package\
        copy LICENSE release_package\
        copy wm.ico release_package\
        copy README.md release_package\

    - name: Zip release package
      run: |
        # Zips only the contents of the package folder for a clean internal structure
        powershell -Command "Compress-Archive -Path release_package\* -DestinationPath Frostbite-${{ github.ref_name }}.zip -Force"
    
    # FIX 3: Uses ID for upload step to reference
    - name: Create GitHub Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: Frostbite ${{ github.ref_name }}
        body_path: notes.md
        draft: false
        prerelease: false
    
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./Frostbite-${{ github.ref_name }}.zip
        asset_name: Frostbite-${{ github.ref_name }}.zip
        asset_content_type: application/zip